<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"rel="stylesheet"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,301,400,401,500,501,700,701,900,901&display=swap" rel="stylesheet"> 
    <link rel="stylesheet" href="style.css">
    <title>RoyalHabits</title>
</head>
<body>
<div class="grid">

    <!-- LEFT BIG BOX -->
    <div class="box reading">
        <h3>Reading Habit</h3>
        <div id="days-grid">
            <div class="days">
                <span>Mon</span>
                <span>Tue</span>
                <span>Wed</span>
                <span>Thu</span>
                <span>Fri</span>
                <span>Sat</span>
                <span>Sun</span>
            </div>
            <div id="tooltip"></div>
            <div class="github-grid"></div>
        </div>
    </div>

    <!-- TOP MIDDLE -->
    <div class="box logo-box">
        <h2>RoyalHabits</h2>
        <img src="./logo.png" alt="">
    </div>

    <!-- ICON BOX -->
    <div class="box icons">
        <div class="blue-icons"> 
            <i class="ri-book-line"></i>
        </div>
        <div>
            <i class="ri-bar-chart-line"></i>
        </div>
        <div>
            <i class="ri-time-line"></i>
        </div>
        <div  class="blue-icons">
            <i class="ri-checkbox-circle-line"></i>
        </div>
    </div>

    <!-- ANALYTICS -->
    <div class="box analytics">

    </div>
    <!-- TIMER -->
    <div class="box timer">
        <h3 id="todayDate"></h3>
        
        <div class="clock" id="pomodoroTime">25:00</div>
        
        <div class="pomodoro-controls">
            <i id="playBtn" class="ri-play-circle-line"></i>
            <i id="pauseBtn" class="ri-pause-circle-line"></i>
            <i id="resetBtn" class="ri-refresh-line"></i>
        </div>
        
        <p>Pomodoro Session</p>
    </div>
    <!-- MUSIC PLAYER -->
    <div class="box main">
        <div id="music-player">
            <audio id="audio" src="./songs/Pehli Dafa.mp3"></audio>
            <div id="player">
                <div id="song">
                    <div id="song-image">
                        <i class="ri-poker-hearts-line"></i>
                        <div id="inner"></div>
                        <!-- <i class="ri-poker-hearts-fill liked"></i> -->
                        <img src="./songs/Pehli_Dafa_Atif_Aslam.webp" alt="">
                    </div>
                    <div id="song-name">Developer</div>
                    <div id="song-author">Avyaan Verma</div>
                </div>
                <div id="media-controls">
                    <input type="range" id="progress-bar" value="0" min="0" max="100" step="1">

                    <div id="controls">
                        <div id="prev"><i class="ri-skip-back-fill"></i></div>
                        <!-- <div id="pause"><i class="ri-pause-circle-fill"></i></div> -->
                        <div id="pause"><i class="ri-play-circle-fill"></i></div>
                        <div id="next"><i class="ri-skip-right-fill"></i></div>
                    </div>

                    <div id="time-display">
                        <span id="curr-time">0:00</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- ROUTE / QUOTE BOX -->
    <div class="box quote">

    <div class="quote-text">
        <h2>Consistency builds greatness.</h2>
        <p>
            Only Royal Habits Allowed.......
        </p>
    </div>

    <div class="quote-illustration">
        <svg width="180" height="180" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="80" fill="#27187d" opacity="0.15"/>
            <circle cx="100" cy="100" r="60" fill="#27187d" opacity="0.25"/>
            <circle cx="100" cy="100" r="40" fill="#27187d"/>
            <text x="100" y="110" text-anchor="middle" fill="white" font-size="18" font-family="Inter">
                Focus
            </text>
        </svg>
    </div>

</div>

</div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./script.js"></script>
</body>

</html>
